<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Mi Auto</title>
  <meta name="theme-color" content="#0b0b0f">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100svh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(74, 144, 255, .22), transparent 35%),
        linear-gradient(180deg, #11131a 0%, #05060a 100%);
      color: #fff;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(440px, 100%);
      border-radius: 28px;
      padding: 30px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
      text-align: center;
      backdrop-filter: blur(14px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 36px;
    }
    .sub {
      margin: 0 0 26px;
      color: rgba(255,255,255,.68);
      line-height: 1.45;
      font-size: 16px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 18px 16px;
      margin: 10px 0;
      font-size: 18px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(.985); }
    .save { background: #21b86b; }
    .find { background: #3478f6; }
    .clear { background: rgba(255,255,255,.12); color: rgba(255,255,255,.86); font-size: 15px; padding: 14px; }
    #status {
      min-height: 58px;
      margin-top: 18px;
      color: rgba(255,255,255,.78);
      font-size: 15px;
      line-height: 1.45;
    }
    .small {
      margin-top: 18px;
      color: rgba(255,255,255,.42);
      font-size: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>🚗 Mi Auto</h1>
    <p class="sub">Guarda dónde dejaste el auto y vuelve caminando con Apple Maps.</p>

    <button class="save" onclick="saveCar()">Guardar ubicación</button>
    <button class="find" onclick="findCar()">Ir a mi auto</button>
    <button class="clear" onclick="clearCar()">Borrar ubicación guardada</button>

    <div id="status"></div>
    <div class="small">La ubicación queda guardada solo en este iPhone.</div>
  </main>

  <script>
    const statusEl = document.getElementById("status");

    function setStatus(text) {
      statusEl.innerHTML = text;
    }

    function loadSaved() {
      const lat = localStorage.getItem("car_lat");
      const lon = localStorage.getItem("car_lon");
      const time = localStorage.getItem("car_time");
      if (lat && lon && time) {
        setStatus("📍 Última ubicación guardada:<br>" + time);
      } else {
        setStatus("Toca “Guardar ubicación” cuando estaciones.");
      }
    }

    function saveCar() {
      if (!navigator.geolocation) {
        setStatus("Este teléfono no permite geolocalización en esta página.");
        return;
      }

      setStatus("Obteniendo ubicación...");

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const accuracy = Math.round(position.coords.accuracy);
          const time = new Date().toLocaleString("es-CL", {
            dateStyle: "medium",
            timeStyle: "short"
          });

          localStorage.setItem("car_lat", lat);
          localStorage.setItem("car_lon", lon);
          localStorage.setItem("car_time", time);

          setStatus("✅ Auto guardado<br>" + time + "<br>Precisión aprox.: " + accuracy + " m");
        },
        () => {
          setStatus("No fue posible obtener la ubicación. Revisa permisos de ubicación para Safari/Chrome.");
        },
        {
          enableHighAccuracy: true,
          timeout: 12000,
          maximumAge: 0
        }
      );
    }

    function findCar() {
      const lat = localStorage.getItem("car_lat");
      const lon = localStorage.getItem("car_lon");

      if (!lat || !lon) {
        setStatus("Primero guarda la ubicación del auto.");
        return;
      }

      window.location.href = "https://maps.apple.com/?daddr=" + lat + "," + lon + "&dirflg=w";
    }

    function clearCar() {
      localStorage.removeItem("car_lat");
      localStorage.removeItem("car_lon");
      localStorage.removeItem("car_time");
      setStatus("Ubicación borrada.");
    }

    loadSaved();
  </script>
</body>
</html>
